    <script>
        // Auto-logout after 5 minutes of inactivity
        (function() {
            let logoutTimer;
            const LOGOUT_TIME = 5 * 60 * 1000; // 5 minutes
            function resetLogoutTimer() {
                clearTimeout(logoutTimer);
                logoutTimer = setTimeout(() => {
                    // Remove token and redirect to login
                    localStorage.removeItem('sb-blwchrthdgdogpgapieg-auth-token');
                    window.location.href = 'login.html';
                }, LOGOUT_TIME);
            }
            // Reset timer on user activity
            ['click', 'mousemove', 'keydown', 'scroll', 'touchstart'].forEach(evt => {
                window.addEventListener(evt, resetLogoutTimer, true);
            });
            resetLogoutTimer();
        })();
        const sbToken = localStorage.getItem('sb-blwchrthdgdogpgapieg-auth-token');
        if (!sbToken) {
            window.location.href = 'login.html';
        }
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Supabase Configuration
        const SUPABASE_URL = 'https://blwchrthdgdogpgapieg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsd2NocnRoZGdkb2dwZ2FwaWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5OTE5MjEsImV4cCI6MjA4NjU2NzkyMX0.xXk-uVyKxT0AsRHnnTcHs3bSJL2r5b17N4zdwZR1qcU';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = themeToggleBtn.querySelector('.icon');
        const htmlElement = document.documentElement;

        // Check local storage for theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            htmlElement.setAttribute('data-theme', 'light');
            themeIcon.textContent = '🌙';
        }

        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.getAttribute('data-theme') === 'light') {
                htmlElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
                themeIcon.textContent = '☀️';
            } else {
                htmlElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeIcon.textContent = '🌙';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            window.location.href = 'login.html';
        });

        let currentResults = [];

        async function loadSearchFilters() {
            try {
                const { data, error } = await supabase
                    .from('staff_members')
                    .select('designation, grade')
                    .limit(2000);
                if (error) throw error;
                
                // Populate designations
                const uniqueDesignations = Array.from(new Set((data || []).map(d => (d.designation || '').trim()).filter(Boolean)));
                const sortedDesignations = uniqueDesignations.sort((a, b) => a.localeCompare(b));
                
                const designationSelect = document.getElementById('search-designation');
                if (designationSelect) {
                    designationSelect.innerHTML = '<option value="">All</option>';
                    sortedDesignations.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d;
                        opt.textContent = d;
                        designationSelect.appendChild(opt);
                    });
                }

                // Populate grades
                const uniqueGrades = Array.from(new Set((data || []).map(d => (d.grade || '').trim()).filter(Boolean)));
                const sortedGrades = uniqueGrades.sort((a, b) => a.localeCompare(b));
                
                const gradeSelect = document.getElementById('search-grade');
                if (gradeSelect) {
                    gradeSelect.innerHTML = '<option value="">All</option>';
                    sortedGrades.forEach(g => {
                        const opt = document.createElement('option');
                        opt.value = g;
                        opt.textContent = g;
                        gradeSelect.appendChild(opt);
                    });
                }
            } catch (err) {
                console.warn('Failed to load search filters:', err);
            }
        }

        async function searchStaff() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading"><div class="loading-spinner"></div><br>Searching...</div>';

            try {
                let query = supabase.from('staff_members').select('*');

                // Apply filters
                const name = document.getElementById('search-name').value.trim();
                const designation = document.getElementById('search-designation').value.trim();
                const grade = document.getElementById('search-grade').value.trim();
                const gender = document.getElementById('search-gender').value;
                const dob = document.getElementById('search-dob')?.value;
                const nic = document.getElementById('search-nic').value.trim();
                const marital = document.getElementById('search-marital').value;

                if (name) {
                    query = query.or(`name_with_initials.ilike.%${name}%,name_full_english.ilike.%${name}%,name_full_sinhala.ilike.%${name}%`);
                }
                if (designation) {
                    query = query.ilike('designation', `%${designation}%`);
                }
                if (grade) {
                    query = query.eq('grade', grade);
                }
                if (gender) {
                    query = query.eq('gender', gender);
                }
                if (dob) {
                    query = query.eq('date_of_birth', dob);
                }
                if (nic) {
                    query = query.ilike('nic_number', `%${nic}%`);
                }
                if (marital) {
                    query = query.eq('marital_status', marital);
                }

                const { data, error } = await query.order('created_at', { ascending: false });

                if (error) throw error;

                // Normalize qualifications field: parse JSON strings to arrays when necessary
                data.forEach(staff => {
                    const q = staff.education_qualifications;
                    if (typeof q === 'string' && q.trim()) {
                        try {
                            const parsed = JSON.parse(q);
                            staff.education_qualifications = parsed;
                        } catch (e) {
                            // keep as string if parse fails
                            staff.education_qualifications = q;
                        }
                    }
                    // Normalize disabilities field: parse JSON strings to arrays when necessary
                    const d = staff.disabilities;
                    if (typeof d === 'string' && d.trim()) {
                        try {
                            const parsedD = JSON.parse(d);
                            staff.disabilities = parsedD;
                        } catch (e) {
                            staff.disabilities = d;
                        }
                    }
                });

                currentResults = data;
                displayResults(data);

            } catch (error) {
                console.error('Search error:', error);
                resultsDiv.innerHTML = `<div class="no-results">Error: ${error.message}</div>`;
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const countDiv = document.getElementById('results-count');

            countDiv.innerHTML = `<strong>${data.length}</strong> result${data.length !== 1 ? 's' : ''} found`;

            if (data.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No staff members found matching your criteria</div>';
                return;
            }

            resultsDiv.innerHTML = data.map((staff, index) => `
                <div class="staff-card">
                    <div class="staff-header">
                        <div>
                            <div class="staff-name">${staff.name_with_initials || 'N/A'}</div>
                            <div class="staff-designation">${staff.designation || 'No designation'}</div>
                        </div>
                        <div class="staff-id">ID: ${(staff.id || '').substring(0, 8)}</div>
                    </div>
                    
                    <div class="staff-details">
                        ${staff.name_full_english ? `
                        <div class="detail-group">
                            <div class="detail-label">Full Name (English)</div>
                            <div class="detail-value">${staff.name_full_english}</div>
                        </div>
                        ` : ''}
                        ${staff.grade ? `
                        <div class="detail-group">
                            <div class="detail-label">Grade</div>
                            <div class="detail-value">${staff.grade}</div>
                        </div>
                        ` : ''}
                        ${staff.gender ? `
                        <div class="detail-group">
                            <div class="detail-label">Gender</div>
                            <div class="detail-value">${staff.gender}</div>
                        </div>
                        ` : ''}
                        ${staff.date_of_birth ? `
                        <div class="detail-group">
                            <div class="detail-label">Date of Birth</div>
                            <div class="detail-value">${new Date(staff.date_of_birth).toLocaleDateString()}</div>
                        </div>
                        ` : ''}
                        ${staff.nic_number ? `
                        <div class="detail-group">
                            <div class="detail-label">NIC Number</div>
                            <div class="detail-value">${staff.nic_number}</div>
                        </div>
                        ` : ''}
                        ${staff.phone_no ? `
                        <div class="detail-group">
                            <div class="detail-label">Phone</div>
                            <div class="detail-value">${staff.phone_no}</div>
                        </div>
                        ` : ''}
                        ${staff.email_address ? `
                        <div class="detail-group">
                            <div class="detail-label">Email</div>
                            <div class="detail-value">${staff.email_address}</div>
                        </div>
                        ` : ''}
                    </div>
                    
                    <button class="expand-btn" data-index="${index}">Show More Details</button>
                    <div style="display:inline-block;margin-left:8px;">
                        <button class="expand-btn edit-btn" data-id="${staff.id}" data-action="edit">Edit</button>
                        <button class="expand-btn delete-btn" data-id="${staff.id}" data-action="delete" style="margin-left:6px;border-color:var(--accent);color:var(--accent);">Delete</button>
                    </div>
                    
                    <div class="expanded-details" id="expanded-${index}">
                        ${staff.permanent_address ? `
                        <div class="detail-group">
                            <div class="detail-label">Permanent Address</div>
                            <div class="detail-value">${staff.permanent_address}</div>
                        </div>
                        ` : ''}
                        
                        ${staff.marital_status || staff.spouse_name ? `
                        <div class="section-subtitle">Family Information</div>
                        <div class="staff-details">
                            ${staff.marital_status ? `
                            <div class="detail-group">
                                <div class="detail-label">Marital Status</div>
                                <div class="detail-value">${staff.marital_status}</div>
                            </div>
                            ` : ''}
                            ${staff.spouse_name ? `
                            <div class="detail-group">
                                <div class="detail-label">Spouse Name</div>
                                <div class="detail-value">${staff.spouse_name}</div>
                            </div>
                            ` : ''}
                            ${staff.spouse_designation ? `
                            <div class="detail-group">
                                <div class="detail-label">Spouse Designation</div>
                                <div class="detail-value">${staff.spouse_designation}</div>
                            </div>
                            ` : ''}
                            ${staff.spouse_workplace ? `
                            <div class="detail-group">
                                <div class="detail-label">Spouse Workplace</div>
                                <div class="detail-value">${staff.spouse_workplace}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                        
                        ${staff.children && staff.children.length > 0 ? `
                        <div class="detail-group">
                            <div class="detail-label">Children</div>
                            <div class="children-list">
                                ${staff.children.map(child => `
                                    <div class="child-item">
                                        <strong>${child.name || 'N/A'}</strong> - 
                                        ${child.gender || 'N/A'} - 
                                        DOB: ${child.date_of_birth || 'N/A'}
                                        ${child.is_disabled ? `<br>ආබාධිතද: ${child.is_disabled === 'Yes' ? 'ඔව්' : 'නැත'}` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                        
                        ${staff.first_appointment_date || staff.previous_appointment_designation ? `
                        <div class="section-subtitle">Employment History</div>
                        <div class="staff-details">
                            ${staff.first_appointment_date ? `
                            <div class="detail-group">
                                <div class="detail-label">First Appointment</div>
                                <div class="detail-value">${new Date(staff.first_appointment_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.previous_appointment_designation ? `
                            <div class="detail-group">
                                <div class="detail-label">Previous Designation</div>
                                <div class="detail-value">${staff.previous_appointment_designation}</div>
                            </div>
                            ` : ''}
                            ${staff.previous_appointment_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Previous Appointment Date</div>
                                <div class="detail-value">${new Date(staff.previous_appointment_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.transferred_to_current_institute_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Transfer Date</div>
                                <div class="detail-value">${new Date(staff.transferred_to_current_institute_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            <div class="detail-group">
                                <div class="detail-label">Permanent Appointment</div>
                                <div class="detail-value">${staff.is_appointment_permanent ? 'Yes' : 'No'}</div>
                            </div>
                            ${staff.permanent_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Permanent Date</div>
                                <div class="detail-value">${new Date(staff.permanent_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                        ${staff.leave_information && Array.isArray(staff.leave_information) && staff.leave_information.length > 0 ? `
                        <div class="section-subtitle">Leave Information</div>
                        <div class="detail-group">
                            <div class="detail-label">Leaves</div>
                            <div class="detail-value">
                                <div class="children-list">
                                    ${staff.leave_information.map(li => `
                                        <div class="child-item">
                                            <strong>${li.type || li.leave_type || 'N/A'}</strong>
                                            ${li.start_date ? ` <div style="margin-top:6px;color:var(--text);">From: ${new Date(li.start_date).toLocaleDateString()}</div>` : ''}
                                            ${li.end_date ? ` <div style="margin-top:4px;color:var(--text-dim);">To: ${new Date(li.end_date).toLocaleDateString()}</div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        ${staff.education_qualifications ? `
                        <div class="section-subtitle">Education</div>
                        <div class="detail-group">
                            <div class="detail-label">Qualifications</div>
                            <div class="detail-value">
                                ${Array.isArray(staff.education_qualifications) ? `
                                    <div class="children-list">
                                        ${staff.education_qualifications.map(q => `
                                            <div class="child-item">
                                                <strong>${q.description || 'N/A'}</strong>
                                                ${q.institution ? `<div style="margin-top:6px;color:var(--text);">${q.institution}</div>` : ''}
                                                ${q.year ? `<div style="margin-top:4px;color:var(--text-dim);">${q.year}</div>` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                ` : `${staff.education_qualifications}`}
                            </div>
                        </div>
                        ` : ''}
                        
                        ${staff.efficiency_bar_exam_grade3_date || staff.efficiency_bar_exam_grade2_date || staff.efficiency_bar_exam_grade1_date ? `
                        <div class="section-subtitle">Efficiency Bar Exams</div>
                        <div class="staff-details">
                            ${staff.efficiency_bar_exam_grade3_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Grade 3 Exam</div>
                                <div class="detail-value">${new Date(staff.efficiency_bar_exam_grade3_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.efficiency_bar_exam_grade2_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Grade 2 Exam</div>
                                <div class="detail-value">${new Date(staff.efficiency_bar_exam_grade2_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.efficiency_bar_exam_grade1_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Grade 1 Exam</div>
                                <div class="detail-value">${new Date(staff.efficiency_bar_exam_grade1_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                        
                        ${staff.promoted_to_grade2_date || staff.promoted_to_grade1_date || staff.promoted_to_special_grade_date || staff.promoted_to_supra_date ? `
                        <div class="section-subtitle">Promotions</div>
                        <div class="staff-details">
                            ${staff.promoted_to_grade2_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Grade 2</div>
                                <div class="detail-value">${new Date(staff.promoted_to_grade2_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.promoted_to_grade1_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Grade 1</div>
                                <div class="detail-value">${new Date(staff.promoted_to_grade1_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.promoted_to_special_grade_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Special Grade</div>
                                <div class="detail-value">${new Date(staff.promoted_to_special_grade_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                            ${staff.promoted_to_supra_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Supra</div>
                                <div class="detail-value">${new Date(staff.promoted_to_supra_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                        
                        ${staff.has_disability || staff.pension_date || staff.resignation_date ? `
                        <div class="section-subtitle">Additional Information</div>
                        <div class="staff-details">
                            ${staff.has_disability ? `
                            <div class="detail-group">
                                <div class="detail-label">Has Disability</div>
                                <div class="detail-value">${staff.has_disability}</div>
                            </div>
                            ` : ''}
                            ${staff.pension_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Pension Date</div>
                                <div class="detail-value">${new Date(staff.pension_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                                ${staff.disabilities && Array.isArray(staff.disabilities) ? `
                                <div class="detail-group">
                                    <div class="detail-label">Disabilities</div>
                                    <div class="children-list">
                                        ${staff.disabilities.map(dis => `
                                            <div class="child-item">
                                                <strong>${dis.description || dis || 'N/A'}</strong>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                ` : ''}
                            ${staff.resignation_date ? `
                            <div class="detail-group">
                                <div class="detail-label">Resignation Date</div>
                                <div class="detail-value">${new Date(staff.resignation_date).toLocaleDateString()}</div>
                            </div>
                            ` : ''}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            // Attach event listeners for expand/edit/delete after rendering
            // Expand
            resultsDiv.querySelectorAll('.expand-btn[data-index]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'), 10);
                    toggleExpand(idx);
                });
            });

            // Edit
            resultsDiv.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    if (!id) return;
                    // Navigate to insert.html with id query param for editing
                    window.location.href = `insert.html?id=${encodeURIComponent(id)}`;
                });
            });

            // Delete
            resultsDiv.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    if (!id) return;
                    const ok = confirm('Are you sure you want to delete this staff member? This action cannot be undone.');
                    if (!ok) return;

                    try {
                        btn.disabled = true;
                        const { error } = await supabase.from('staff_members').delete().eq('id', id);
                        if (error) throw error;
                        // Remove from currentResults and re-render
                        currentResults = currentResults.filter(s => s.id !== id);
                        displayResults(currentResults);
                    } catch (err) {
                        console.error('Delete error:', err);
                        alert('Error deleting staff: ' + (err.message || err));
                    } finally {
                        btn.disabled = false;
                    }
                });
            });
        }

        function toggleExpand(index) {
            const expandedDiv = document.getElementById(`expanded-${index}`);
            const btn = document.querySelector(`.expand-btn[data-index="${index}"]`);

            if (!expandedDiv) return;

            if (expandedDiv.classList.contains('show')) {
                expandedDiv.classList.remove('show');
                if (btn) btn.textContent = 'Show More Details';
            } else {
                expandedDiv.classList.add('show');
                if (btn) btn.textContent = 'Show Less Details';
            }
        }

        function clearSearch() {
            document.getElementById('search-name').value = '';
            document.getElementById('search-designation').value = '';
            document.getElementById('search-grade').value = '';
            document.getElementById('search-gender').value = '';
            document.getElementById('search-nic').value = '';
            document.getElementById('search-marital').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('results-count').innerHTML = '<strong>0</strong> results found';
            currentResults = [];
        }

        function exportResults() {
            if (currentResults.length === 0) {
                alert('No results to export');
                return;
            }

            function safeParseJSON(val) {
                if (typeof val === 'string' && val.trim()) {
                    try {
                        return JSON.parse(val);
                    } catch (e) {
                        return val;
                    }
                }
                return val;
            }

            function formatQualifications(quals) {
                const parsed = safeParseJSON(quals);
                if (!parsed) return '';
                if (Array.isArray(parsed)) {
                    return parsed.map(q => {
                        const desc = q.description || '';
                        const inst = q.institution ? ` at ${q.institution}` : '';
                        const year = q.year ? ` (${q.year})` : '';
                        return `${desc}${inst}${year}`;
                    }).join('; ');
                }
                return String(parsed);
            }

            function formatChildren(children) {
                const parsed = safeParseJSON(children);
                if (!parsed || !Array.isArray(parsed)) return '';
                return parsed.map(c => {
                    const name = c.name || 'N/A';
                    const gender = c.gender || 'N/A';
                    const dob = c.date_of_birth || 'N/A';
                    const disabled = c.is_disabled ? ` (Disabled: ${c.is_disabled})` : '';
                    return `${name} (${gender}, DOB: ${dob}${disabled})`;
                }).join('; ');
            }

            function formatLeave(leaves) {
                const parsed = safeParseJSON(leaves);
                if (!parsed || !Array.isArray(parsed)) return '';
                return parsed.map(l => {
                    const type = l.type || l.leave_type || 'N/A';
                    const start = l.start_date || 'N/A';
                    const end = l.end_date || 'N/A';
                    return `${type} (${start} to ${end})`;
                }).join('; ');
            }

            function formatDisabilities(dis) {
                const parsed = safeParseJSON(dis);
                if (!parsed) return '';
                if (Array.isArray(parsed)) {
                    return parsed.map(d => d.description || d || '').filter(Boolean).join('; ');
                }
                return String(parsed);
            }

            function escapeCSV(val) {
                if (val === undefined || val === null) return '""';
                let str = String(val);
                str = str.replace(/"/g, '""');
                return `"${str}"`;
            }

            const columns = [
                { header: 'ID', select: s => s.id || '' },
                { header: 'Name with Initials', select: s => s.name_with_initials || '' },
                { header: 'Full Name (English)', select: s => s.name_full_english || '' },
                { header: 'Full Name (Sinhala)', select: s => s.name_full_sinhala || '' },
                { header: 'Date of Birth', select: s => s.date_of_birth || '' },
                { header: 'NIC Number', select: s => s.nic_number || '' },
                { header: 'Gender', select: s => s.gender || '' },
                { header: 'Marital Status', select: s => s.marital_status || '' },
                { header: 'Permanent Address', select: s => s.permanent_address || '' },
                { header: 'Phone Number', select: s => s.phone_no || '' },
                { header: 'WhatsApp Number', select: s => s.whatsapp_no || '' },
                { header: 'Email Address', select: s => s.email_address || '' },
                { header: 'Designation', select: s => s.designation || '' },
                { header: 'Grade', select: s => s.grade || '' },
                { header: 'First Appointment Date', select: s => s.first_appointment_date || '' },
                { header: 'Appointment Letter Number', select: s => s.appointment_letter_no || '' },
                { header: 'Previous Appointment Designation', select: s => s.previous_appointment_designation || '' },
                { header: 'Previous Appointment Date', select: s => s.previous_appointment_date || '' },
                { header: 'Transferred to Current Institute Date', select: s => s.transferred_to_current_institute_date || '' },
                { header: 'Is Appointment Permanent', select: s => s.is_appointment_permanent ? 'Yes' : 'No' },
                { header: 'Permanent Date', select: s => s.permanent_date || '' },
                { header: 'Education & Qualifications', select: s => formatQualifications(s.education_qualifications) },
                { header: 'Efficiency Bar Exam Grade 3 Date', select: s => s.efficiency_bar_exam_grade3_date || '' },
                { header: 'Efficiency Bar Exam Grade 2 Date', select: s => s.efficiency_bar_exam_grade2_date || '' },
                { header: 'Efficiency Bar Exam Grade 1 Date', select: s => s.efficiency_bar_exam_grade1_date || '' },
                { header: 'Second Language Proficiency', select: s => s.second_language_proficiency || '' },
                { header: 'Promoted to Grade 2 Date', select: s => s.promoted_to_grade2_date || '' },
                { header: 'Promoted to Grade 1 Date', select: s => s.promoted_to_grade1_date || '' },
                { header: 'Promoted to Special Grade Date', select: s => s.promoted_to_special_grade_date || '' },
                { header: 'Promoted to Supra Date', select: s => s.promoted_to_supra_date || '' },
                { header: 'Spouse Name', select: s => s.spouse_name || '' },
                { header: 'Spouse Designation', select: s => s.spouse_designation || '' },
                { header: 'Spouse Workplace', select: s => s.spouse_workplace || '' },
                { header: 'Children Information', select: s => formatChildren(s.children) },
                { header: 'Has Disability', select: s => s.has_disability || '' },
                { header: 'Disabilities', select: s => formatDisabilities(s.disabilities) },
                { header: 'Pension Date', select: s => s.pension_date || '' },
                { header: 'Resignation Date', select: s => s.resignation_date || '' },
                { header: 'Moved to Another Service Date', select: s => s.moved_to_another_service_date || '' },
                { header: 'Dismissal Date', select: s => s.dismissal_date || '' },
                { header: 'Leave Information', select: s => formatLeave(s.leave_information) },
                { header: 'Created At', select: s => s.created_at || '' }
            ];

            const headers = columns.map(c => c.header);
            const csvRows = [
                headers.map(h => escapeCSV(h)).join(','),
                ...currentResults.map(staff => columns.map(col => col.select(staff)).map(val => escapeCSV(val)).join(','))
            ];
            const csvContent = csvRows.join('\n');

            // Add UTF-8 BOM for Sinhala/Unicode support
            const BOM = '\uFEFF';
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `staff_export_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Expose functions to global scope for inline onclick handlers
        window.searchStaff = searchStaff;
        window.clearSearch = clearSearch;
        window.exportResults = exportResults;
        window.toggleExpand = toggleExpand;

        // Load all staff on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadSearchFilters();
            searchStaff();
        });
    </script>

    <script>
        // Show/hide the floating button based on scroll position
        const goToTopBtn = document.getElementById('go-to-top-btn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 200) {
                goToTopBtn.style.display = 'block';
            } else {
                goToTopBtn.style.display = 'none';
            }
        });
        goToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>

</html>
